<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>EP Teacher Questionnaire — Secondary & Post-16</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--navy:#1b2d50;--teal:#2e8b7a;--teal-lt:#eaf4f2;--amber:#d97a2e;--amber-lt:#fdf1e6;--red:#c0392b;--green:#27734a;--slate:#4a5568;--mid:#6b7280;--border:#dde3ed;--bg:#f4f6fb;--fh:'Playfair Display',Georgia,serif;--fb:'DM Sans',-apple-system,sans-serif;--r:14px;--sh:0 2px 18px rgba(27,45,80,.09)}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);font-family:var(--fb);color:var(--navy);font-size:16px;line-height:1.65;-webkit-tap-highlight-color:transparent}
input,textarea,select,button{font-family:var(--fb);font-size:15px}
.hdr{background:var(--navy);padding:14px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:200;box-shadow:0 3px 16px rgba(0,0,0,.28)}
.hdr h1{font-family:var(--fh);color:#fff;font-size:16px;line-height:1.2}
.hdr .sub{color:rgba(255,255,255,.5);font-size:11px;text-transform:uppercase;letter-spacing:.07em;margin-top:2px}
.pct{background:rgba(255,255,255,.12);color:#fff;border-radius:20px;padding:4px 10px;font-size:12px;font-weight:600}
.sv-bar{background:var(--teal);color:#fff;text-align:center;padding:7px;font-size:13px;font-weight:500;transition:opacity .4s;height:34px}
.sv-bar.hidden{opacity:0;pointer-events:none}
.snav{display:flex;gap:6px;padding:10px 14px;overflow-x:auto;background:#fff;border-bottom:1px solid var(--border);scrollbar-width:none;-webkit-overflow-scrolling:touch}
.snav::-webkit-scrollbar{display:none}
.npill{flex:0 0 auto;padding:6px 13px;border-radius:20px;font-size:12.5px;font-weight:500;border:1.5px solid var(--border);background:#fff;color:var(--slate);cursor:pointer;white-space:nowrap;transition:all .15s}
.npill.act{background:var(--navy);border-color:var(--navy);color:#fff}
.npill.vis{border-color:var(--teal);color:var(--teal)}
.npill.p16{border-color:#7c3aed;color:#7c3aed}
.npill.p16.act{background:#7c3aed;border-color:#7c3aed;color:#fff}
.fw{max-width:720px;margin:0 auto;padding:16px 16px 60px}
.sh{margin:22px 0 14px}
.sbadge{display:inline-flex;align-items:center;background:var(--navy);color:#fff;font-size:11px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;padding:3px 10px;border-radius:4px;margin-bottom:8px}
.sbadge.p16{background:#7c3aed}
.sh h2{font-family:var(--fh);font-size:21px;margin-bottom:4px}
.sh p{font-size:14px;color:var(--slate)}
.card{background:#fff;border-radius:var(--r);padding:20px;margin-bottom:12px;box-shadow:var(--sh)}
.card label{display:block;font-size:14px;font-weight:500;color:var(--navy);margin-bottom:7px}
.card input[type=text],.card input[type=email],.card input[type=tel],.card input[type=number],.card select,.card textarea{width:100%;padding:11px 14px;border:1.5px solid var(--border);border-radius:9px;font-size:15px;color:var(--navy);background:var(--bg);transition:border-color .15s}
.card input:focus,.card select:focus,.card textarea:focus{outline:none;border-color:var(--teal);background:#fff}
.card textarea{min-height:76px;resize:vertical}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.fr3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
@media(max-width:500px){.fr{grid-template-columns:1fr}.fr3{grid-template-columns:1fr}}
.hint{font-size:12px;color:var(--mid);font-style:italic;margin-bottom:8px;margin-top:-2px}
.rg{display:flex;flex-direction:column;gap:7px}
.ro{display:flex;align-items:center;gap:10px;padding:10px 14px;border:1.5px solid var(--border);border-radius:9px;cursor:pointer;font-size:14px;transition:all .12s}
.ro:hover{border-color:var(--teal);background:var(--teal-lt)}
.ro.sel{border-color:var(--teal);background:var(--teal-lt);font-weight:500}
.ro input{accent-color:var(--teal);width:17px;height:17px;flex-shrink:0}
.rg-inline{display:flex;flex-direction:row;flex-wrap:wrap;gap:8px;margin-top:8px}
.rg-inline .ro{flex:0 0 auto;width:auto}
.cg{display:grid;grid-template-columns:1fr 1fr;gap:7px}
@media(max-width:480px){.cg{grid-template-columns:1fr}}
.co{display:flex;align-items:center;gap:8px;padding:9px 12px;border:1.5px solid var(--border);border-radius:8px;cursor:pointer;font-size:13.5px;transition:all .12s}
.co:hover{border-color:var(--teal);background:var(--teal-lt)}
.co.sel{border-color:var(--teal);background:var(--teal-lt)}
.co input{accent-color:var(--teal);width:16px;height:16px;flex-shrink:0}
.qb{background:#fff;border-radius:var(--r);padding:18px 20px;margin-bottom:10px;box-shadow:var(--sh)}
.qb .q{font-size:15px;font-weight:500;color:var(--navy);margin-bottom:6px}
.qb .qh{font-size:12px;color:var(--mid);font-style:italic;margin-bottom:8px}
.qb textarea{width:100%;padding:11px 14px;border:1.5px solid var(--border);border-radius:9px;font-size:15px;color:var(--navy);background:var(--bg);min-height:76px;resize:vertical;transition:border-color .15s}
.qb textarea:focus{outline:none;border-color:var(--teal);background:#fff}
.tsec{background:#fff;border-radius:var(--r);margin-bottom:12px;overflow:visible;box-shadow:var(--sh)}
.tttl{background:var(--bg);padding:11px 16px;font-size:14px;font-weight:600;color:var(--navy);border-bottom:1px solid var(--border);border-radius:var(--r) var(--r) 0 0}
.tchdr{display:grid;grid-template-columns:1fr 1fr;background:var(--bg);border-bottom:1px solid var(--border)}
.tchdr span{padding:7px 14px;font-size:11.5px;font-weight:700;text-transform:uppercase;letter-spacing:.06em}
.tchdr .shdr{color:var(--green);border-right:1px solid var(--border)}
.tchdr .dhdr{color:var(--red)}
.tbody{display:grid;grid-template-columns:1fr 1fr}
.tcol{display:flex;flex-direction:column}
.tcol.sc{border-right:1px solid var(--border)}
.ti{display:flex;align-items:flex-start;gap:9px;padding:10px 14px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .1s;font-size:13.5px;line-height:1.4}
.ti:last-child{border-bottom:none}
.ti:hover{background:var(--bg)}
.ti input[type=checkbox]{flex-shrink:0;width:17px;height:17px;margin-top:2px;accent-color:var(--teal)}
.tcol.dc .ti input[type=checkbox]{accent-color:var(--red)}
.dex{display:none;padding:12px 14px 14px;background:#fff8f6;border-top:1px solid #f5cfc9;border-bottom:1px solid #f5cfc9}
.dex.open{display:block}
.dex .dlbl{font-size:13px;font-weight:600;color:var(--red);margin-bottom:5px;display:block}
.dex textarea{width:100%;padding:10px 12px;border:1.5px solid #f5cfc9;border-radius:8px;font-size:14px;color:var(--navy);background:#fff;min-height:68px;resize:vertical}
.dex textarea:focus{outline:none;border-color:var(--red)}
.dex .egrid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
@media(max-width:520px){.dex .egrid{grid-template-columns:1fr}}
.tnotes{padding:12px 16px;background:var(--bg);border-top:1px solid var(--border);border-radius:0 0 var(--r) var(--r)}
.tnotes label{font-size:13px;font-weight:500;color:var(--slate);margin-bottom:6px;display:block}
.tnotes textarea{width:100%;padding:10px 12px;border:1.5px solid var(--border);border-radius:8px;font-size:14px;color:var(--navy);background:#fff;min-height:64px;resize:vertical}
.tnotes textarea:focus{outline:none;border-color:var(--teal)}
.obox{background:var(--amber-lt);border:1.5px solid #e8b580;border-radius:var(--r);padding:18px 20px;margin-bottom:12px}
.obox h3{font-family:var(--fh);font-size:16px;color:var(--amber);margin-bottom:4px}
.obox p{font-size:13px;color:var(--slate);margin-bottom:12px}
.oi{margin-bottom:10px}
.oi label{font-size:13.5px;font-weight:500;color:var(--navy);margin-bottom:5px;display:block}
.oi textarea{width:100%;padding:10px 12px;border:1.5px solid #e8b580;border-radius:8px;font-size:14px;color:var(--navy);background:#fff;min-height:60px;resize:vertical}
.oi textarea:focus{outline:none;border-color:var(--amber)}
.att-wrap{overflow-x:auto}
.att-t{width:100%;border-collapse:collapse;font-size:13.5px}
.att-t th{background:var(--navy);color:#fff;padding:9px 10px;font-weight:500;font-size:12px;white-space:nowrap}
.att-t td{padding:9px 10px;border-bottom:1px solid var(--border);vertical-align:middle}
.att-t tr:nth-child(even) td{background:var(--bg)}
.att-t tr:last-child td{border-bottom:none}
.att-t input[type=radio]{accent-color:var(--navy);width:15px;height:15px}
.yrin{width:54px;padding:4px 6px;border:1.5px solid var(--border);border-radius:6px;font-size:13px;text-align:center}
.prt{background:#fff;border-radius:var(--r);box-shadow:var(--sh);overflow:hidden;margin-bottom:12px}
.prr{display:flex;align-items:center;gap:12px;padding:12px 16px;border-bottom:1px solid var(--border);font-size:14px}
.prr:last-child{border-bottom:none}
.prr input[type=checkbox]{width:18px;height:18px;flex-shrink:0;accent-color:var(--navy)}
.prrl{flex:1;cursor:pointer}
.prrs{margin-left:auto;display:flex;align-items:center;gap:6px;font-size:13px;color:var(--mid);flex-shrink:0}
.prrs select{padding:4px 8px;border:1.5px solid var(--border);border-radius:6px;font-size:13px;color:var(--navy);background:var(--bg)}
.iw{max-width:560px;margin:40px auto;padding:16px}
.ic{background:#fff;border-radius:20px;padding:32px 28px;box-shadow:var(--sh)}
.ic h2{font-family:var(--fh);font-size:24px;margin-bottom:8px}
.ic .st{color:var(--mid);font-size:14px;margin-bottom:20px}
.infobox{background:var(--teal-lt);border-left:4px solid var(--teal);border-radius:0 10px 10px 0;padding:15px 17px;margin:18px 0;font-size:14px;color:var(--navy)}
.infobox strong{display:block;color:var(--teal);font-size:12px;text-transform:uppercase;letter-spacing:.06em;margin-bottom:5px}
.infobox p{margin-bottom:7px}
.infobox p:last-child{margin-bottom:0}
.resbox{background:var(--amber-lt);border:1.5px solid var(--amber);border-radius:10px;padding:14px 16px;margin:14px 0;font-size:14px}
.resbox strong{color:var(--amber);display:block;font-size:12px;text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px}
.btn{display:block;width:100%;padding:14px 20px;border-radius:10px;border:none;font-size:15px;font-weight:600;cursor:pointer;text-align:center;transition:transform .1s}
.btn:active{transform:scale(.98)}
.btp{background:var(--teal);color:#fff;margin-bottom:10px;box-shadow:0 4px 14px rgba(46,139,122,.3)}
.bts{background:#fff;color:var(--navy);border:1.5px solid var(--border);margin-bottom:10px}
.btf{background:var(--navy);color:#fff;box-shadow:0 4px 14px rgba(27,45,80,.3)}
.bte{background:#2c7a2c;color:#fff;box-shadow:0 4px 14px rgba(44,122,44,.3);margin-bottom:10px}
.btskip{background:#f5f0ff;color:#7c3aed;border:2px solid #a78bfa;margin-bottom:10px;box-shadow:none}
.nbs{display:flex;gap:10px;margin-top:24px}
.nbs .btn{flex:1}
.dw{max-width:560px;margin:40px auto;padding:16px;text-align:center}
.dc{background:#fff;border-radius:20px;padding:28px;box-shadow:var(--sh)}
.dc h2{font-family:var(--fh);font-size:22px;margin-bottom:10px}
.dc p{color:var(--slate);font-size:14px;margin-bottom:12px}
.rpre{background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:18px;text-align:left;font-size:12.5px;line-height:1.7;white-space:pre-wrap;max-height:380px;overflow-y:auto;margin:14px 0;color:var(--navy)}
.sinote{background:var(--teal-lt);border-radius:10px;padding:12px 16px;font-size:13.5px;color:var(--navy);margin-bottom:14px;border:1px solid #b8dcd8}
.teach-note{background:#fffbf0;border:1.5px solid #e8c96a;border-radius:10px;padding:12px 16px;font-size:13.5px;color:var(--navy);margin-bottom:14px}
.p16-note{background:#f5f0ff;border:1.5px solid #a78bfa;border-radius:10px;padding:14px 16px;font-size:13.5px;color:#3b1a8a;margin-bottom:14px}
.p16-skip{background:#f5f0ff;border:2px solid #a78bfa;border-radius:14px;padding:22px 24px;margin-bottom:18px;text-align:center}
.p16-skip h3{font-family:var(--fh);color:#7c3aed;font-size:18px;margin-bottom:8px}
.p16-skip p{color:#4b3a7a;font-size:14px;margin-bottom:16px;line-height:1.6}
.attbar-bg{height:18px;background:#e8edf5;border-radius:10px;overflow:hidden;margin:10px 0 4px}
.attbar{height:100%;border-radius:10px;transition:width .4s;background:var(--teal)}
.attbar.amber{background:var(--amber)}
.attbar.red{background:var(--red)}
.attlabel{font-size:12px;color:var(--mid);text-align:right}
.email-box{background:var(--teal-lt);border:1.5px solid var(--teal);border-radius:12px;padding:18px 20px;margin-bottom:16px}
.email-box label{display:block;font-size:14px;font-weight:600;color:var(--navy);margin-bottom:8px}
.email-box input{width:100%;padding:11px 14px;border:1.5px solid var(--border);border-radius:9px;font-size:15px;color:var(--navy);background:#fff}
.email-box input:focus{outline:none;border-color:var(--teal)}
.email-box .hint{margin-top:8px;margin-bottom:0}
.p16-section{border:2px solid #a78bfa;border-radius:var(--r)}
.p16-section .tttl{background:#f5f0ff;color:#3b1a8a}
</style>
</head>

let ST={phase:‘intro’,si:0,d:{}};
// In-memory storage only (localStorage/sessionStorage not available in this environment).
// Progress is kept while the page is open. Use the Save / Load buttons to preserve across sessions.
function lST(){return false;}
function sST(){}
function hSaved(){return false;}
function sName(){return ST.d.child_forename||’’;}
function sTime(){return ‘’;}
let _st=null;
function dbSave(){clearTimeout(_st);_st=setTimeout(()=>{fSave();},700);}
function fSave(){const b=document.getElementById(‘svb’);if(!b)return;b.classList.remove(‘hidden’);clearTimeout(b._t);b._t=setTimeout(()=>b.classList.add(‘hidden’),2000);}
function sv(k,v){ST.d[k]=v;dbSave();}
function gv(k,def=’’){return ST.d[k]!==undefined?ST.d[k]:def;}
function exportSave(){
const json=JSON.stringify({d:ST.d,si:ST.si},null,2);
const blob=new Blob([json],{type:‘application/json’});
const url=URL.createObjectURL(blob);
const a=document.createElement(‘a’);
a.href=url;a.download=‘ep_questionnaire_save.json’;
document.body.appendChild(a);a.click();
document.body.removeChild(a);URL.revokeObjectURL(url);
}
function importSave(file){
const reader=new FileReader();
reader.onload=e=>{try{
const p=JSON.parse(e.target.result);
ST.d=p.d||{};ST.si=p.si||0;
ST.phase=‘form’;render();
}catch(err){alert(‘Could not load save file — please check it is the correct file.’);}};
reader.readAsText(file);
}

// FIX 3: Corrected HTML entity escaping (was missing semicolons on all entities)
function esc(s){return String(s||’’).replace(/&/g,’&’).replace(/</g,’<’).replace(/>/g,’>’).replace(/”/g,’"’);}

// Detect if student is Post-16 based on year group or explicit flag
function isPost16(){
const yg=gv(‘year_group’,’’);
return gv(‘is_p16’)===‘Yes — Post-16’||yg.includes(‘12’)||yg.includes(‘13’)||yg.toLowerCase().includes(‘post’);
}

function render(){
const a=document.getElementById(‘app’);
if(ST.phase===‘intro’){a.innerHTML=rIntro();bIntro();return;}
if(ST.phase===‘done’){a.innerHTML=rDone();bDone();return;}
a.innerHTML=rForm();bForm();window.scrollTo(0,0);
}

function bIntro(){

function rSec(sec){
if(sec.id===‘det’)return rDet();
if(sec.id===‘bg’)return rBg();
if(sec.id===‘att’)return rAtt();
if(sec.id===‘sup’)return rSup();
if(sec.id===‘pri’)return rPri();
if(sec.id===‘phy’)return rTick(‘phy’,‘A: Physical & Sensory’,‘🏃’,‘Tick all items based on direct observation in school. Ticking a <span style="color:var(--red);font-weight:600">difficulty</span> opens explanation boxes.’);
if(sec.id===‘com’)return rTick(‘com’,‘B: Communication & Interaction’,‘💬’,‘Based on direct observations in school. Ticking a <span style="color:var(--red);font-weight:600">difficulty</span> opens explanation boxes.’);
if(sec.id===‘sem’)return rTick(‘sem’,‘C: Social, Emotional & Mental Health’,‘❤️’,‘Based on direct observations in school. Ticking a <span style="color:var(--red);font-weight:600">difficulty</span> opens explanation boxes.’);

if(sec.id===‘cv’)return rCV();
if(sec.id===‘tv’)return rTV();
if(sec.id===‘p16’)return rP16();
return’’;
}

function rPri(){

{id:‘pr_cog’,l:‘Cognition and Learning — e.g., reading, writing, maths, memory, processing, organisation’},
{id:‘pr_com’,l:‘Communication and Interaction — e.g., speech, language, social communication, listening’},
{id:‘pr_sem’,l:‘Social, Emotional and Mental Health — e.g., anxiety, regulation, behaviour, wellbeing, attendance’},
{id:‘pr_phy’,l:‘Physical and Sensory — e.g., coordination, sensory processing, fine motor, health’},
{id:‘pr_hlt’,l:‘Health — e.g., medical conditions significantly affecting school life and learning’},
];
return`<div class="sh"><span class="sbadge">5. Main Concerns</span><h2>⭐ What are your main professional concerns?</h2>

<p>Tick all areas of concern and number in priority order (1 = most significant in your professional view).</p></div>
<div class="prt">${areas.map(a=>`<div class="prr">
<input type="checkbox" id="c_${a.id}"${gv(a.id)?' checked':''}>
<label class="prrl" for="c_${a.id}">${a.l}</label>
<div class="prrs">Priority: <select id="s_${a.id}"><option value="">—</option>${[1,2,3,4,5].map(n=>`<option value="${n}"${gv(a.id+'_p')==n?' selected':''}>${n}</option>`).join('')}</select></div>
</div>`).join('')}</div>
${qb('pr_other','Any other professional concern not listed above?','e.g., school refusal, self-harm, suicidal ideation, significant trauma, safeguarding concerns')}`;

function rTick(sec,title,icon,desc){
const subs=TDATA[sec];
let html=`<div class="sh"><span class="sbadge">Section ${title.split(’:’)[0]}</span><h2>${icon} ${title.split(’: ‘).slice(1).join(’: ’)||title}</h2><p>${desc}</p></div>

<div class="sinote">✅ <strong>Left (green)</strong> = observed strengths &nbsp;|&nbsp; ⚠️ <strong>Right (red)</strong> = observed difficulties. Base on direct observation — tick as many as apply on both sides.</div>`;
subs.forEach(sub=>{
if(sub.special){html+=rAttGrid();return;}
html+=`<div class="tsec">
<div class="tttl">${sub.t}</div>
<div class="tchdr"><span class="shdr">✅ Strengths — Observed in School</span><span class="dhdr">⚠️ Difficulties — Observed in School</span></div>
<div class="tbody">
<div class="tcol sc">${sub.ps.map(p=>`<label class="ti"><input type="checkbox" id="c_${p.id}_s"${gv(p.id+'_s')?' checked':''}><span>${p.s}</span></label>`).join('')}</div>
<div class="tcol dc">${sub.ps.map(p=>`<div>
<label class="ti"><input type="checkbox" id="c_${p.id}_d"${gv(p.id+'_d')?' checked':''}><span>${p.d}</span></label>
${rDex(p.id)}
</div>`).join('')}</div>
</div>
<div class="tnotes"><label>Additional notes — specific examples help the EP:</label>
<textarea id="fi_${sub.n}" placeholder="Add further observations or examples...">${esc(gv(sub.n))}</textarea></div>
</div>`;
});
html+=rOuts(sec);return html;
}

function rDex(pid){
const open=gv(pid+’_d’);
return`<div class="dex${open?' open':''}" id="dx_${pid}">

<div class="egrid">
<div><span class="dlbl">How does this present in school?</span>
<textarea id="fi_${pid}_imp" placeholder="Describe how this presents in school — give concrete examples...">${esc(gv(pid+'_imp'))}</textarea></div>
<div><span class="dlbl">Strategies / support in place &amp; impact?</span>
<textarea id="fi_${pid}_sup" placeholder="Describe current strategies and their impact...">${esc(gv(pid+'_sup'))}</textarea></div>
</div></div>`;
}

function rOuts(sec){
const outs=OUTS[sec];if(!outs)return’’;
return`<div class="obox"><h3>🎯 Desired Outcomes (School View)</h3>

<p>After 12 months of support, what would you most like this student to be able to do?</p>
${outs.map(o=>`<div class="oi"><label>${o.l}</label><textarea id="fi_${o.id}" placeholder="${o.ph}">${esc(gv(o.id))}</textarea></div>`).join('')}
</div>`;
}

${['Above Average','Average','Below Average','Significantly Below Average'].map(o=>`<label class="ro${gv('ll')===o?' sel':''}" style="flex:0 0 auto"><input type="radio" name="ll" value="${o}"${gv('ll')===o?' checked':''}>${o}</label>`).join('')}

</div></div>

</div>
<div style="padding:12px 16px;background:var(--bg);border-top:1px solid var(--border)">
<label style="font-size:13px;font-weight:500;color:var(--slate);display:block;margin-bottom:6px">Standardised test scores (if available)</label>
<textarea id="fi_std_scores" style="width:100%;padding:10px 12px;border:1.5px solid var(--border);border-radius:8px;font-size:14px;color:var(--navy);background:#fff;min-height:60px;resize:vertical" placeholder="e.g. NGRT Reading SS 74; CAT4 Verbal 78, Quantitative 82, Non-verbal 94...">${esc(gv('std_scores'))}</textarea>

function rCV(){
return`<div class="sh"><span class="sbadge">6. Student Voice</span><h2>🗣️ The Student’s Experience</h2>

<p>Capture what the student has expressed directly and what you observe through their behaviour in school.</p></div>

${qb('cv_dislikes','What do they say or show they find hardest in school?','e.g., says "I hate English"; visibly distressed during writing tasks; avoids all group work')}
${qb('cv_school_feel','How does the student appear to feel about school generally?','e.g., arrives anxious daily, says "nobody gets me here"; settled in 1:1 but distressed in class')}

function rTV(){
return`<div class="sh"><span class="sbadge">7. Staff Professional Views</span><h2>👩‍🏫 Your Professional Views & Observations</h2>

<p>This is your professional contribution to the EP assessment. Please be as specific and evidence-based as possible.</p></div>
${qb('tv_str','What do you see as this student\'s greatest strengths and areas of progress in school?','e.g., strong visual reasoning, genuine empathy with vulnerable peers, notable progress in science this term')}
${qb('tv_con','What are your biggest professional concerns about this student right now?','e.g., no measurable progress in writing in 2 years; significant anxiety preventing access to most lessons')}
${qb('tv_compare','How does this student\'s attainment and development compare to age-expected peers?','e.g., reading approximately 3 years behind; social and emotional development significantly below peers')}
${qb('tv_progress','What progress has the student made since joining the school or your class?','e.g., reading has improved with intervention; regulation has worsened significantly this year')}
${qb('tv_typical','How does presentation vary across the school day, week, term or across subjects?','e.g., significantly better with familiar staff; deteriorates after lunch; worse following school holidays')}
${qb('tv_home','How does school presentation compare to what parents or carers report at home?','e.g., parents report no difficulties at home — significant discrepancy with school')}
${qb('tv_triggers','What typically triggers distress, dysregulation or avoidance in school?','e.g., any writing task, peer conflict, being called on in class, supply teacher, exam conditions')}
${qb('tv_strategies','What does the student respond well to in terms of strategies and adult approaches?','e.g., 1:1 pre-teaching, visual task card, advance warning of changes, low-demand start')}
${qb('tv_concerns_send','In your professional view, what areas of SEND does this student present with and how significant are they?','e.g., in my view significant SpLD consistent with dyslexia alongside significant anxiety')}
${qb('tv_next','What do you believe this student needs that school cannot provide without additional funding or specialist support?','e.g., specialist literacy teaching; intensive therapeutic support; alternative placement')}
${qb('tv_ehcp','If applicable — why does this student need an EHCP and what would it enable?','e.g., needs substantially exceed notional SEND budget')}
${qb('tv_risk','Are there any current risk or safeguarding concerns the EP should be aware of?','e.g., self-harm disclosed to pastoral staff; suicidal ideation reported')}
${qb('tv_ep','Is there anything else the EP must know before the assessment?','e.g., student presents very differently on a good day; recent significant life event')}
${qb('tv_collab','How would you like to work with the EP and other professionals going forward?','e.g., joint observation would be valuable; debrief meeting would help')}`;
}
